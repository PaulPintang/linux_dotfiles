# Define the "editor" for text files as first action
mime ^text,  label editor = vim -- "$@"
mime ^text,  label pager  = $PAGER -- "$@"
!mime ^text, label editor, ext xml|json|csv|tex|py|pl|rb|rs|js|sh|php|dart = vim -- "$@"
!mime ^text, label pager,  ext xml|json|csv|tex|py|pl|rb|rs|js|sh|php|dart = $PAGER -- "$@"

# Images
mime ^image, has nsxiv, X, flag f = nsxiv -- "$@"

#Videos
mime ^video|^audio, has mpv, X, flag f = mpv -- "$@"
